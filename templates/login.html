<!DOCTYPE html>
<html>
<head>
  <title>AxonEMR Login</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: #0b2035;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      width: 380px;
      background: #142b45;
      padding: 36px;
      border-radius: 18px;
      border: 1px solid #2f4964;
      box-shadow: 0 20px 50px rgba(0,0,0,.25);
      text-align: center;
    }

    .logo {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      background: #334f6d;
      display: grid;
      place-items: center;
      margin: 0 auto 16px;
      font-size: 28px;
    }

    h1 {
      margin: 0;
      font-size: 28px;
    }

    .subtitle {
      color: #aab7c5;
      margin: 12px 0 30px;
      font-size: 14px;
    }

    label {
      display: block;
      text-align: left;
      margin-bottom: 8px;
      color: #d7e2ee;
      font-weight: bold;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      padding: 13px;
      border-radius: 10px;
      border: 1px solid #49637d;
      background: #0f243a;
      color: white;
      margin-bottom: 18px;
      font-size: 15px;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: #38bdf8;
      color: #062033;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
    }

    .footer {
      margin-top: 24px;
      color: #7f92a8;
      font-size: 13px;
    }

    .error {
      background: #fee2e2;
      color: #991b1b;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 18px;
    }
  </style>
</head>

<body>
  <div class="login-card">
    <div class="logo">⌁</div>
    <h1>AxonEMR</h1>
    <p class="subtitle">Electronic Medical Record System · v4.2.1</p>

    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

      <label>Username</label>
      <input type="text" name="username" required>

      <label>Password</label>
      <input type="password" name="password" required>

      <button type="submit">Login</button>
    </form>

    <div class="footer">
      HIPAA Compliant · Session Encrypted · Audit Logged
    </div>
  </div>
</body>
</html>
